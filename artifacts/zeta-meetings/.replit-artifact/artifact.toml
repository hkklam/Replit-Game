kind = "web"
previewPath = "/"
title = "ZETA Meeting Notes"
version = "1.0.0"
id = "artifacts/zeta-meetings"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24296

[services.development]
run = "pnpm --filter @workspace/zeta-meetings run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zeta-meetings", "run", "build" ]
publicDir = "artifacts/zeta-meetings/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24296"
BASE_PATH = "/"
